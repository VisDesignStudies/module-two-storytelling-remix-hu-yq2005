# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html style.css script.js _site/
          if [ -d data ]; then cp -R data _site/; fi
          if [ -d css ]; then cp -R css _site/; fi
          if [ -d js ]; then cp -R js _site/; fi
          find _site -name .DS_Store -delete

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
